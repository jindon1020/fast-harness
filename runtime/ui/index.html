      while (i < lines.length && !/^```\s*$/.test(lines[i])) {
        code.push(lines[i]);
        i++;
      }
      if (i < lines.length) i++;
      blocks.push(`<pre><code>${escapeHtml(code.join("\n"))}</code></pre>`);
      continue;
    }

    if (/^\s*(-{3,}|\*{3,}|_{3,})\s*$/.test(line)) {
      blocks.push("<hr>");
      i++;
      continue;
    }

    const heading = line.match(/^(#{1,6})\s+(.+)$/);
    if (heading) {
      const level = heading[1].length;
      blocks.push(`<h${level}>${renderInlineMarkdown(heading[2].trim())}</h${level}>`);
      i++;
      continue;
    }

    if (isMarkdownTableStart(lines, i)) {
      const tableLines = [lines[i], lines[i + 1]];
      i += 2;
      while (i < lines.length && isTableRow(lines[i])) {
        tableLines.push(lines[i]);
        i++;
      }
      blocks.push(renderMarkdownTable(tableLines));
      continue;
    }

    if (/^>\s?/.test(line)) {
      const quote = [];
      while (i < lines.length && /^>\s?/.test(lines[i])) {
        quote.push(lines[i].replace(/^>\s?/, ""));
        i++;
      }
      blocks.push(`<blockquote>${quote.map(renderInlineMarkdown).join("<br>")}</blockquote>`);
      continue;
    }

    if (/^\s*[-*+]\s+/.test(line)) {
      const items = [];
      while (i < lines.length && /^\s*[-*+]\s+/.test(lines[i])) {
        items.push(lines[i].replace(/^\s*[-*+]\s+/, ""));
        i++;
      }
      blocks.push(`<ul>${items.map(item => `<li>${renderInlineMarkdown(item)}</li>`).join("")}</ul>`);
      continue;
    }

    if (/^\s*\d+\.\s+/.test(line)) {
      const items = [];
      while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])) {
        items.push(lines[i].replace(/^\s*\d+\.\s+/, ""));
        i++;
      }
      blocks.push(`<ol>${items.map(item => `<li>${renderInlineMarkdown(item)}</li>`).join("")}</ol>`);
      continue;
    }

    const para = [line];
    i++;
    while (
      i < lines.length &&
      lines[i].trim() &&
      !/^```/.test(lines[i]) &&
      !/^(#{1,6})\s+/.test(lines[i]) &&
      !/^\s*(-{3,}|\*{3,}|_{3,})\s*$/.test(lines[i]) &&
      !isMarkdownTableStart(lines, i) &&
      !/^>\s?/.test(lines[i]) &&
      !/^\s*[-*+]\s+/.test(lines[i]) &&
      !/^\s*\d+\.\s+/.test(lines[i])
    ) {
      para.push(lines[i]);
      i++;
    }
    blocks.push(`<p>${para.map(renderInlineMarkdown).join("<br>")}</p>`);
  }

  return blocks.join("");
}

function renderInlineMarkdown(text) {
  const codeTokens = [];
  let html = escapeHtml(text).replace(/`([^`]+)`/g, (_match, code) => {
    const token = `@@CODE${codeTokens.length}@@`;
    codeTokens.push(`<code>${code}</code>`);
    return token;
  });

  html = html
    .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
    .replace(/__([^_]+)__/g, "<strong>$1</strong>")
    .replace(/\*([^*\n]+)\*/g, "<em>$1</em>")
    .replace(/_([^_\n]+)_/g, "<em>$1</em>")
    .replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');

  return codeTokens.reduce((value, token, index) => value.replace(`@@CODE${index}@@`, token), html);
}

function isTableRow(line) {
  return /^\s*\|.*\|\s*$/.test(line) && line.split("|").length >= 3;
}

function isTableSeparator(line) {
  return isTableRow(line) && line
    .trim()
    .slice(1, -1)
    .split("|")
    .every(cell => /^\s*:?-{3,}:?\s*$/.test(cell));
}

function isMarkdownTableStart(lines, index) {
  return index + 1 < lines.length && isTableRow(lines[index]) && isTableSeparator(lines[index + 1]);
}

function splitTableRow(line) {
  return line.trim().replace(/^\|/, "").replace(/\|$/, "").split("|").map(cell => cell.trim());
}

function tableAlignments(separatorLine) {
  return splitTableRow(separatorLine).map(cell => {
    const left = cell.startsWith(":");
    const right = cell.endsWith(":");
    if (left && right) return "center";
    if (right) return "right";
    return "left";
  });
}

function renderMarkdownTable(tableLines) {
  const headers = splitTableRow(tableLines[0]);
  const aligns = tableAlignments(tableLines[1]);
  const rows = tableLines.slice(2).map(splitTableRow);
  const style = index => ` style="text-align:${aligns[index] || "left"}"`;
  return `<table><thead><tr>${headers.map((cell, index) =>
    `<th${style(index)}>${renderInlineMarkdown(cell)}</th>`
  ).join("")}</tr></thead><tbody>${rows.map(row =>
    `<tr>${headers.map((_header, index) =>
      `<td${style(index)}>${renderInlineMarkdown(row[index] || "")}</td>`
    ).join("")}</tr>`
  ).join("")}</tbody></table>`;
}

function escapeHtml(str) {
  if (!str) return "";
  const d = document.createElement("div");
  d.textContent = str;
  return d.innerHTML;
}

function getSessionStream(sessionId) {
  return state.sessionStreams[sessionId] || null;
}

function isSessionStreaming(sessionId) {
  return !!getSessionStream(sessionId)?.streaming;
}

function updateSendButton() {
  const hasSession = !!state.activeSession;
  const streaming = isSessionStreaming(state.activeSession);
  const canSend = hasSession && (!!promptInput.value.trim() || state.pendingImages.length > 0);
  promptInput.disabled = !hasSession;
  btnSend.disabled = streaming ? false : !canSend;
  if (!hasSession) {
    btnSend.textContent = "↑";
    btnSend.classList.remove("btn-send--stop");
    updateRepoActionButtons();
    return;
  }
  if (streaming) {
    btnSend.textContent = "■";
    btnSend.classList.add("btn-send--stop");
  } else {
    btnSend.textContent = "↑";
    btnSend.classList.remove("btn-send--stop");
  }
  updateRepoActionButtons();
}

async function addImageFiles(files) {
  const imageFiles = [...files].filter(file => file && file.type?.startsWith("image/"));
  if (!imageFiles.length) return;
  const accepted = [];
  for (const file of imageFiles) {
    if (!ACCEPTED_IMAGE_TYPES.has(file.type)) {
      addErrorMessage(`Unsupported image type: ${file.type || file.name}`);
      continue;
    }
    if (file.size > MAX_IMAGE_BYTES) {
      addErrorMessage(`Image is larger than 10MB: ${file.name}`);
      continue;
    }
    if (state.pendingImages.length + accepted.length >= MAX_IMAGE_ATTACHMENTS) {
      addErrorMessage(`Attach up to ${MAX_IMAGE_ATTACHMENTS} images per message.`);
      break;
    }
    accepted.push(file);
  }
  const attachments = await Promise.all(accepted.map(fileToImageAttachment));
  state.pendingImages.push(...attachments);
  renderImageTray();
  updateSendButton();
}

function fileToImageAttachment(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const dataUrl = String(reader.result || "");
      const comma = dataUrl.indexOf(",");
      resolve({
        id: crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`,
        name: file.name || "pasted-image",
        mime_type: file.type,
        size: file.size,
        data: comma >= 0 ? dataUrl.slice(comma + 1) : dataUrl,
        previewUrl: dataUrl,
      });
    };
    reader.onerror = () => reject(reader.error || new Error("Failed to read image"));
    reader.readAsDataURL(file);
  });
}

function renderImageTray() {
  imageTray.innerHTML = "";
  if (!state.pendingImages.length) {
    imageTray.style.display = "none";
    return;
  }
  imageTray.style.display = "flex";
  imageTray.appendChild(createImagePreviewStrip(state.pendingImages));
}

function removePendingImage(id) {
  state.pendingImages = state.pendingImages.filter(image => image.id !== id);
  renderImageTray();
  updateSendButton();
}

function clearPendingImages() {
  state.pendingImages = [];
  renderImageTray();
  updateSendButton();
}

function queryImagesPayload() {
  return state.pendingImages.map(({ name, mime_type, data, size }) => ({
    name,
    mime_type,
    data,
    size,
  }));
}

function preferredQuickCommands(commands) {
  const preferred = [
    "implement",
    "fix",
    "refactor",
    "modify",
    "deploy-creation-tool-dev",
  ];
  const byName = new Map((commands || []).map(command => [command.name, command]));
  const picked = preferred.map(name => byName.get(name)).filter(Boolean);
  const extras = (commands || []).filter(command => !preferred.includes(command.name)).slice(0, Math.max(0, 6 - picked.length));
  return [...picked, ...extras];
}

function renderQuickCommands(commands) {
  if (!quickCommands) return;
  const items = preferredQuickCommands(commands);
  if (!items.length) {
    quickCommands.innerHTML = "";
    return;
  }
  quickCommands.innerHTML = items.map(command => `
    <button class="quick-command" type="button" data-command="${escapeHtml(command.name)}" title="${escapeHtml(command.description || "/" + command.name)}">/${escapeHtml(command.name)}</button>
  `).join("");
}

async function initQuickCommands() {
  try {
    const caps = await ensureCapabilities();
    renderQuickCommands(caps.commands || []);
  } catch (e) {
    renderQuickCommands([
      { name: "implement" },
      { name: "fix" },
      { name: "refactor" },
      { name: "modify" },
    ]);
  }
}

function applyQuickCommand(commandName) {
  if (!state.activeSession) {
    showAlertDialog("Select or create a session first");
    return;
  }
  promptInput.value = `/${commandName} `;
  resizePromptInput();
  hideCommandSuggestions();
  promptInput.focus();
}

function currentSessionInfo() {
  return state.sessions.find(session => session.session_id === state.activeSession) || null;
}

function defaultCommitMessage() {
  const session = currentSessionInfo();
  const repo = session?.metadata?.repo_name || "repo";
  return `Update ${repo} from fast-harness runtime`;
}

async function loadSuggestedCommitMessage(fallback) {
  if (!state.activeSession) return fallback;
  try {
    const data = await api("GET", `/sessions/${state.activeSession}/git/commit-message`);
    return data.message || fallback;
  } catch (e) {
    console.warn("AI commit message generation failed:", e);
    return fallback;
  }
}

function updateRepoActionButtons() {
  const disabled = !state.activeSession || isSessionStreaming(state.activeSession) || state.repoActionRunning;
  if (btnGitCommit) btnGitCommit.disabled = disabled;
  if (btnGitPush) btnGitPush.disabled = disabled;
}

function showToast(message, type = "info") {
  const toast = document.createElement("div");
  toast.className = `toast toast--${type}`;
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(() => {
    toast.style.opacity = "0";
    toast.style.transform = "translateY(20px)";
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

function gitActionMessage(action, result) {
  const branch = result?.branch ? ` (${result.branch})` : "";
  if (action === "commit" && result?.status === "clean") return "No changes to commit.";
  if (action === "commit") return `Committed changes${branch}.`;
  return `Pushed changes${branch}.`;
}

async function commitActiveSession() {
  if (!state.activeSession) return showToast("Select or create a session first", "error");
  const message = await showCommitDialog(defaultCommitMessage());
  if (!message || !message.trim()) return;
  await runRepoAction(async () => {
    const result = await api("POST", `/sessions/${state.activeSession}/git/commit`, { message: message.trim() });
    const msg = gitActionMessage("commit", result);
    const type = result?.status === "clean" ? "info" : "success";
    showToast(msg, type);
  });
}

async function pushActiveSession() {
  if (!state.activeSession) return showToast("Select or create a session first", "error");
  await runRepoAction(async () => {
    const status = await api("GET", `/sessions/${state.activeSession}/git/status`);
    if (!status.clean) {
      showToast("You have uncommitted changes. Please commit first.", "error");
      return;
    }
    const result = await api("POST", `/sessions/${state.activeSession}/git/push`);
    showToast(gitActionMessage("push", result), "success");
  });
}

async function runRepoAction(action) {
  if (isSessionStreaming(state.activeSession)) {
    showToast("Wait for the running session to finish first", "error");
    return;
  }
  state.repoActionRunning = true;
  updateRepoActionButtons();
  try {
    await action();
    if (state.panelOpen && state.panelTab === "files") loadFiles();
  } catch (e) {
    showToast(e.message || "Git action failed", "error");
  } finally {
    state.repoActionRunning = false;
    updateRepoActionButtons();
  }
}

async function sendPrompt() {
  const sessionId = state.activeSession;
  const images = queryImagesPayload();
  const previews = state.pendingImages.map(({ data, ...image }) => image);
  const prompt = promptInput.value.trim() || (images.length ? "请分析这些图片。" : "");
  if ((!prompt && !images.length) || !sessionId || isSessionStreaming(sessionId)) return;
  hideCommandSuggestions();

  promptInput.value = "";
  promptInput.style.height = "auto";
  clearPendingImages();
  const stream = {
    streaming: true,
    abortController: new AbortController(),
    messageEl: null,
    textEl: null,
    since: null,
  };
  state.sessionStreams[sessionId] = stream;
  updateSendButton();

  // Show user message
  if (state.activeSession === sessionId) {
    renderUserPrompt(prompt, previews);
    scrollToBottom();
  }
  stream.since = await loadSessionHistoryCount(sessionId) - 1;

  // Create streaming message container
  if (state.activeSession === sessionId) {
    stream.messageEl = document.createElement("div");
    stream.messageEl.className = "msg";
    chatInner.appendChild(stream.messageEl);
  }

  const url = API + "/sessions/" + sessionId + "/query";
  try {
    const res = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json", ...authHeaders() },
      body: JSON.stringify({ prompt, images }),
      signal: stream.abortController.signal,
    });
    if (!res.ok) throw new Error(await responseErrorMessage(res));
    await consumeSseResponse(res, sessionId, stream);
  } catch (e) {
    if (e.name !== "AbortError" && state.activeSession === sessionId) {
      addErrorMessage(e.message);
    }
  }

  stopStreaming(sessionId);
}

async function loadSessionHistoryCount(sessionId) {
  try {
    const data = await api("GET", "/sessions/" + sessionId + "/messages");
    return (data.messages || []).length;
  } catch {
    return 0;
  }
}

async function reconnectSessionStream(sessionId) {
  if (!sessionId || isSessionStreaming(sessionId)) return;
  const since = await loadSessionHistoryCount(sessionId) - 1;
  const stream = {
    streaming: true,
    abortController: new AbortController(),
    messageEl: null,
    textEl: null,
    since,
  };
  state.sessionStreams[sessionId] = stream;
  updateSendButton();
  try {
    const res = await fetch(`${API}/sessions/${sessionId}/stream?since=${encodeURIComponent(since)}`, {
      headers: authHeaders(),
      signal: stream.abortController.signal,
    });
    if (!res.ok) throw new Error(await responseErrorMessage(res));
    await consumeSseResponse(res, sessionId, stream);
  } catch (e) {
    if (e.name !== "AbortError") console.warn("Session stream reconnect failed:", e);
  }
  stopStreaming(sessionId);
}

async function consumeSseResponse(res, sessionId, stream) {
  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buffer = "";

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split("\n");
    buffer = lines.pop() || "";

    for (const line of lines) {
      if (!line.startsWith("data: ")) continue;
      try {
        const msg = JSON.parse(line.slice(6));
        if (msg.type === "stream_done") return;
        if (msg.type === "status") continue;
        if (state.activeSession === sessionId) {
          if (!stream.messageEl || !stream.messageEl.isConnected) {
            stream.messageEl = document.createElement("div");
            stream.messageEl.className = "msg";
            stream.textEl = null;
            chatInner.appendChild(stream.messageEl);
          }
          stream.textEl = handleStreamMessage(msg, stream.messageEl, stream.textEl);
        }
      } catch (e) { /* skip parse errors */ }
    }
  }
}

async function cancelActiveQuery(sessionId) {
  const stream = getSessionStream(sessionId);
  if (stream?.abortController) stream.abortController.abort();
  try {
    await api("POST", `/sessions/${sessionId}/query/cancel`);
  } catch (e) {
    console.warn("Failed to cancel query:", e);
  }
  stopStreaming(sessionId);
}

function handleStreamMessage(msg, container, textEl) {
  if (!container) return textEl;
  // system/init — show a compact startup line
  if (msg.type === "system" && msg.subtype === "init") {
    const div = document.createElement("div");
    div.className = "msg msg--system";
    div.textContent = `session · ${msg.session_id?.slice(0,8) || "?"} | model · ${msg.model || "?"} | cwd · ${msg.cwd || "?"}`;
    container.appendChild(div);
    return textEl;
  }
  if (msg.type === "system") return textEl; // skip other system messages

  // tool_results — update corresponding tool block with result
  if (msg.type === "tool_results" && msg.content) {
    for (const block of msg.content) {
      const toolBlocks = container.querySelectorAll(".tool-block");
      for (const tb of toolBlocks) {
        const head = tb.querySelector(".tool-block__head");
        if (head && head.textContent.includes(block.tool_use_id?.slice(0,8))) {
          const body = tb.querySelector(".tool-block__body");
          if (body) body.textContent = block.content || "(no output)";
          if (block.is_error) tb.style.borderColor = "var(--error)";
        }
      }
    }
    return textEl;
  }

  if (msg.type === "assistant") {
    for (const block of (msg.content || [])) {
      if (block.type === "text") {
        if (!textEl) {
          textEl = document.createElement("div");
          textEl.className = "msg__text";
          container.appendChild(textEl);
          textEl._html = "";
        }
        textEl._html += block.text;
        textEl.innerHTML = renderMarkdown(textEl._html);
      } else if (block.type === "tool_use") {
        textEl = null;
        container.appendChild(createToolBlock(block));
      } else if (block.type === "thinking") {
        container.appendChild(createThinkBlock(block.thinking));
      } else if (block.type === "ask_user_question") {
        textEl = null;
        container.appendChild(createAskBlock(block));
      }
    }
  } else if (msg.type === "result") {
    if (msg.result) {
      const div = document.createElement("div");
      div.className = "msg__text";
      div.innerHTML = renderMarkdown(msg.result);
      container.appendChild(div);
      if (msg.total_cost_usd) {
        const cost = document.createElement("div");
        cost.className = "msg__cost";
        cost.textContent = `$${msg.total_cost_usd.toFixed(4)}`;
        container.appendChild(cost);
      }
    }
    addFeedbackButton(container, msg);
  } else if (msg.type === "error") {
    const div = document.createElement("div");
    div.className = "msg__text";
    div.style.color = "var(--error)";
    div.textContent = "Error: " + (msg.message || "Unknown");
    container.appendChild(div);
  } else if (msg.type === "cancelled") {
    container.remove();
  }
  scrollToBottom();
  return textEl;
}

function stopStreaming(sessionId = state.activeSession) {
  if (!sessionId) return;
  const stream = getSessionStream(sessionId);
  if (stream) {
    stream.streaming = false;
    stream.abortController = null;
    stream.messageEl = null;
    stream.textEl = null;
    delete state.sessionStreams[sessionId];
  }
  if (state.activeSession === sessionId) updateSendButton();
}

/* ═══════════════════════ PANEL ═══════════════════════ */

function togglePanel(btn) {
  if (btn === btnUsage && state.currentUser?.role !== "admin") return;
  if (state.panelOpen && btn.classList.contains("btn-tool--active")) {
    closePanel();
    return;
  }
  state.panelOpen = true;
  app.classList.add("app--panel-open");
  panel.style.display = "flex";
  btnUsage.classList.remove("btn-tool--active");
  btnCapabilities.classList.remove("btn-tool--active");
  btnFiles.classList.remove("btn-tool--active");
  btn.classList.add("btn-tool--active");
  state.panelTab = btn === btnUsage ? "usage" : btn === btnCapabilities ? "capabilities" : btn === btnFiles ? "files" : "repos";
  panelTitle.textContent = panelTitleForTab(state.panelTab);
  panelTabs.style.display = state.panelTab === "usage" ? "none" : "flex";
  $$(".panel__tab").forEach(t => t.classList.remove("panel__tab--active"));
  const tab = $(`.panel__tab[data-tab="${state.panelTab}"]`);
  if (tab) tab.classList.add("panel__tab--active");
  if (state.panelTab === "usage") loadUsageStats();
  else if (state.panelTab === "capabilities") loadCapabilities();
  else if (state.panelTab === "files") loadFiles();
  else renderRepoPanel();
}

function panelTitleForTab(tab) {
  return tab === "usage" ? "Usage" : tab === "capabilities" ? "Capabilities" : tab === "files" ? "Session Files" : "Repos";
}

function closePanel() {
  state.panelOpen = false;
  app.classList.remove("app--panel-open");
  panel.style.display = "none";
  btnUsage.classList.remove("btn-tool--active");
  btnCapabilities.classList.remove("btn-tool--active");
  btnFiles.classList.remove("btn-tool--active");
}

async function loadCapabilities() {
  panelBody.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
  try {
    const data = await api("GET", "/capabilities");
    state.capabilities = data;
    renderCapabilities(data);
  } catch (e) {
    panelBody.innerHTML = `<div class="msg--error">Failed to load: ${escapeHtml(e.message)}</div>`;
  }
}

function renderCapabilities(caps) {
  let html = "";
  if (caps.commands && caps.commands.length) {
    html += '<div class="cap-section"><div class="cap-section__title">Commands</div>';
    for (const c of caps.commands) {
      html += `<div class="cap-item"><div class="cap-item__name">/${c.name}</div><div class="cap-item__desc">${escapeHtml(c.description || "")}</div></div>`;
    }
    html += "</div>";
  }
  if (caps.agents && Object.keys(caps.agents).length) {
    html += '<div class="cap-section"><div class="cap-section__title">Agents</div>';
    for (const [name, a] of Object.entries(caps.agents)) {
      html += `<div class="cap-item"><div class="cap-item__name">${escapeHtml(name)}</div><div class="cap-item__desc">${escapeHtml(a.description || "")}</div></div>`;
    }
    html += "</div>";
  }
  if (caps.skills && caps.skills.length) {
    html += '<div class="cap-section"><div class="cap-section__title">Skills</div>';
    for (const s of caps.skills) {
      html += `<div class="cap-item"><div class="cap-item__name">${escapeHtml(s.name)}</div><div class="cap-item__desc">${escapeHtml(s.description || "")}</div></div>`;
    }
    html += "</div>";
  }
  if (!html) html = '<div style="color:var(--text-muted);font-size:12px;padding:12px">No capabilities discovered.</div>';
  panelBody.innerHTML = html;
}

async function loadUsageStats() {
  panelBody.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
  try {
    const data = await api("GET", "/usage-stats");
    renderUsageStats(data);
  } catch (e) {
    panelBody.innerHTML = `<div class="msg--error">Failed to load usage: ${escapeHtml(e.message)}</div>`;
  }
}

function renderUsageStats(data) {
  const totals = data.totals || {};
  let html = `<div class="usage-summary">
    ${usageMetric(totals.conversation_count || 0, "Conversations")}
    ${usageMetric(totals.command_count || 0, "Commands")}
    ${usageMetric(totals.session_count || 0, "Sessions")}
    ${usageMetric(totals.feedback_count || 0, "Feedback")}
  </div>`;

  for (const user of (data.users || [])) {
    const active = user.last_active ? formatDateTime(user.last_active) : "No activity";
    const commands = (user.commands || []).length
      ? user.commands.map(c => `<span class="usage-command">/${escapeHtml(c.command)} × ${c.count}</span>`).join("")
      : '<span class="usage-command">No commands</span>';
    html += `<div class="usage-user">
      <div class="usage-user__head">
        <div class="usage-user__name">${escapeHtml(user.name || user.user_id)}</div>
        <div class="usage-user__active">${escapeHtml(active)}</div>
      </div>
      <div class="usage-user__grid">
        ${usageUserStat(user.conversation_count || 0, "talks")}
        ${usageUserStat(user.command_count || 0, "commands")}
        ${usageUserStat(user.result_count || 0, "results")}
        ${usageUserStat(user.session_count || 0, "sessions")}
        ${usageUserStat(user.workspace_count || 0, "workspaces")}
        ${usageUserStat(user.feedback_count || 0, "feedback")}
      </div>
      <div class="usage-commands">${commands}</div>
    </div>`;
  }

  panelBody.innerHTML = html;
}

function usageMetric(value, label) {
  return `<div class="usage-metric"><div class="usage-metric__value">${Number(value || 0)}</div><div class="usage-metric__label">${escapeHtml(label)}</div></div>`;
}

function usageUserStat(value, label) {
  return `<div class="usage-user__stat"><strong>${Number(value || 0)}</strong><span>${escapeHtml(label)}</span></div>`;
}

function formatDateTime(value) {
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return value;
  return date.toLocaleString();
}

async function loadFiles() {
  if (!state.activeSession) return;
  panelBody.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
  try {
    const data = await api("GET", "/sessions/" + state.activeSession + "/files");
    renderFiles(data);
  } catch (e) {
    panelBody.innerHTML = `<div class="msg--error">Failed to load files: ${escapeHtml(e.message)}</div>`;
  }
}

function renderFiles(data) {
  let html = "";
  if (data.files && data.files.length) {
    for (const f of data.files) {
      const icon = f.endsWith(".py") ? "🐍" : f.endsWith(".md") ? "📝" : f.endsWith(".json") ? "📋" : f.endsWith(".ts") ? "🔷" : f.endsWith(".js") ? "🟨" : "📄";
      html += `<div class="file-item" onclick="viewFile('${escapeHtml(f)}')">
        <span class="file-item__icon">${icon}</span>
        <span class="file-item__name">${escapeHtml(f)}</span>
      </div>`;
    }
  } else {
    html = '<div style="color:var(--text-muted);font-size:12px;padding:12px">No files in workspace yet.</div>';
  }
  panelBody.innerHTML = html + '<div id="fileViewer" class="file-viewer" style="display:none"></div>';
}

async function viewFile(path) {
  if (!state.activeSession) return;
  const viewer = $("#fileViewer");
  viewer.style.display = "block";
  viewer.textContent = "Loading...";
  try {
    const data = await api("GET", "/sessions/" + state.activeSession + "/files/" + path);
    viewer.textContent = data.content;
  } catch (e) {
    viewer.textContent = "Error: " + e.message;
  }
}

/* ═══════════════════════ COMMAND SUGGESTIONS ═══════════════════════ */

async function ensureCapabilities() {
  if (!state.capabilities) {
    state.capabilities = await api("GET", "/capabilities");
  }
  return state.capabilities;
}

async function updateCommandSuggestions() {
  await renderCommandSuggestions();
}

async function renderCommandSuggestions() {
  const match = promptInput.value.match(/^\/([^\s]*)$/);
  if (!match || promptInput.disabled) {
    hideCommandSuggestions();
    return;
  }

  try {
    const caps = await ensureCapabilities();
    const query = match[1].toLowerCase();
    const commands = (caps.commands || [])
      .filter(c => (c.name || "").toLowerCase().startsWith(query))
      .slice(0, 8);

    state.commandSuggestions = commands;
    state.selectedCommandIndex = 0;
    renderCommandSuggestionItems();
  } catch (e) {
    hideCommandSuggestions();
  }
}

function renderCommandSuggestionItems() {
  if (!state.commandSuggestions.length) {
    hideCommandSuggestions();
    return;
  }

  commandMenu.innerHTML = state.commandSuggestions.map((c, i) => `
    <div class="command-menu__item ${i === state.selectedCommandIndex ? "command-menu__item--selected" : ""}"
         role="option" data-index="${i}">
      <div class="command-menu__name">/${escapeHtml(c.name || "")}</div>
      <div class="command-menu__desc">${escapeHtml(c.description || "")}</div>
    </div>
  `).join("");
  commandMenu.style.display = "block";
}

function hideCommandSuggestions() {
  state.commandSuggestions = [];
  state.selectedCommandIndex = 0;
  commandMenu.style.display = "none";
  commandMenu.innerHTML = "";
}

function isCommandMenuVisible() {
  return commandMenu.style.display !== "none" && state.commandSuggestions.length > 0;
}

function moveCommandSelection(delta) {
  const count = state.commandSuggestions.length;
  if (!count) return;
  state.selectedCommandIndex = (state.selectedCommandIndex + delta + count) % count;
  renderCommandSuggestionItems();
}

function applyCommandSuggestion(index) {
  const command = state.commandSuggestions[index];
  if (!command) return;
  promptInput.value = `/${command.name} `;
  promptInput.style.height = "auto";
  promptInput.style.height = Math.min(promptInput.scrollHeight, 200) + "px";
  hideCommandSuggestions();
  promptInput.focus();
}

/* ═══════════════════════ THEME ═══════════════════════ */

function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute("data-theme");
  const next = current === "dark" ? "light" : "dark";
  html.setAttribute("data-theme", next);
  localStorage.setItem("theme", next);
}

function initTheme() {
  const savedTheme = localStorage.getItem("theme");
  document.documentElement.setAttribute("data-theme", savedTheme || "light");
}

function initSidebarResize() {
  const handle = $("#sidebarResizeHandle");
  if (!handle) return;
  const savedWidth = localStorage.getItem("sidebarWidth");
  if (savedWidth) app.style.setProperty("--sidebar-width", savedWidth + "px");

  handle.addEventListener("pointerdown", (event) => {
    event.preventDefault();
    handle.setPointerCapture(event.pointerId);
    app.classList.add("app--resizing");
  });
  handle.addEventListener("pointermove", (event) => {
    if (!app.classList.contains("app--resizing")) return;
    const width = Math.max(220, Math.min(480, event.clientX));
    app.style.setProperty("--sidebar-width", width + "px");
    localStorage.setItem("sidebarWidth", String(width));
  });
  handle.addEventListener("pointerup", (event) => {
    if (handle.hasPointerCapture(event.pointerId)) handle.releasePointerCapture(event.pointerId);
    app.classList.remove("app--resizing");
  });
  handle.addEventListener("pointercancel", () => {
    app.classList.remove("app--resizing");
  });
}

function isMobileViewport() {
  return window.matchMedia("(max-width: 860px)").matches;
}

function openMobileSidebar() {
  document.body.classList.add("mobile-nav-open");
  btnMobileMenu?.setAttribute("aria-expanded", "true");
}

function closeMobileSidebar() {
  document.body.classList.remove("mobile-nav-open");
  btnMobileMenu?.setAttribute("aria-expanded", "false");
}

function toggleMobileSidebar() {
  if (!isMobileViewport()) return;
  if (document.body.classList.contains("mobile-nav-open")) closeMobileSidebar();
  else openMobileSidebar();
}

function initMobileNav() {
  btnMobileMenu?.setAttribute("aria-expanded", "false");
  btnMobileMenu?.addEventListener("click", toggleMobileSidebar);
  mobileSidebarBackdrop?.addEventListener("click", closeMobileSidebar);
  document.addEventListener("keydown", event => {
    if (event.key === "Escape") closeMobileSidebar();
  });
  window.addEventListener("resize", () => {
    if (!isMobileViewport()) closeMobileSidebar();
  });
}

/* ═══════════════════════ INPUT AUTO-RESIZE ═══════════════════════ */

function resizePromptInput() {
  promptInput.style.height = "auto";
  promptInput.style.height = Math.min(promptInput.scrollHeight, 200) + "px";
}

promptInput.addEventListener("input", resizePromptInput);
promptInput.addEventListener("input", updateCommandSuggestions);
promptInput.addEventListener("input", updateSendButton);
promptInput.addEventListener("paste", event => {
  const files = [...(event.clipboardData?.items || [])]
    .filter(item => item.kind === "file" && item.type.startsWith("image/"))
    .map(item => item.getAsFile())
    .filter(Boolean);
  if (files.length) {
    event.preventDefault();
    addImageFiles(files);
  }
});

inputWrap.addEventListener("dragenter", event => {
  if ([...(event.dataTransfer?.items || [])].some(item => item.kind === "file")) {
    event.preventDefault();
    inputWrap.classList.add("input-wrap--drag");
  }
});
inputWrap.addEventListener("dragover", event => {
  if ([...(event.dataTransfer?.items || [])].some(item => item.kind === "file")) {
    event.preventDefault();
    inputWrap.classList.add("input-wrap--drag");
  }
});
inputWrap.addEventListener("dragleave", event => {
  if (!inputWrap.contains(event.relatedTarget)) {
    inputWrap.classList.remove("input-wrap--drag");
  }
});
inputWrap.addEventListener("drop", event => {
  inputWrap.classList.remove("input-wrap--drag");
  const files = [...(event.dataTransfer?.files || [])];
  if (files.some(file => file.type?.startsWith("image/"))) {
    event.preventDefault();
    addImageFiles(files);
  }
});

/* ═══════════════════════ KEYBOARD SHORTCUTS ═══════════════════════ */

promptInput.addEventListener("keydown", (e) => {
  if (isCommandMenuVisible()) {
    if (e.key === "ArrowDown") { e.preventDefault(); moveCommandSelection(1); return; }
    if (e.key === "ArrowUp") { e.preventDefault(); moveCommandSelection(-1); return; }
    if (e.key === "Tab" || (e.key === "Enter" && !e.shiftKey)) {
      e.preventDefault();
      applyCommandSuggestion(state.selectedCommandIndex);
      return;
    }
    if (e.key === "Escape") { e.preventDefault(); hideCommandSuggestions(); return; }
  }
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendPrompt(); }
});

/* ═══════════════════════ EVENT BINDINGS ═══════════════════════ */

$("#btnAddWs").addEventListener("click", createWorkspace);
btnSend.addEventListener("click", () => {
  const stream = getSessionStream(state.activeSession);
  if (stream?.streaming) {
    cancelActiveQuery(state.activeSession);
  } else {
    sendPrompt();
  }
});
btnCapabilities.addEventListener("click", () => togglePanel(btnCapabilities));
btnUsage.addEventListener("click", () => togglePanel(btnUsage));
btnFiles.addEventListener("click", () => togglePanel(btnFiles));
commandMenu.addEventListener("mousedown", (e) => {
  const item = e.target.closest(".command-menu__item");
  if (!item) return;
  e.preventDefault();
  applyCommandSuggestion(Number(item.dataset.index));
});
quickCommands.addEventListener("click", (e) => {
  const item = e.target.closest(".quick-command");
  if (!item) return;
  applyQuickCommand(item.dataset.command || "");
});
btnGitCommit.addEventListener("click", commitActiveSession);
btnGitPush.addEventListener("click", pushActiveSession);
$("#btnClosePanel").addEventListener("click", closePanel);
$("#themeToggle").addEventListener("click", toggleTheme);
btnLogout.addEventListener("click", logout);
panelTabs.addEventListener("click", (e) => {
  if (!e.target.classList.contains("panel__tab")) return;
  state.panelTab = e.target.dataset.tab;
  panelTitle.textContent = panelTitleForTab(state.panelTab);
  $$(".panel__tab").forEach(t => t.classList.remove("panel__tab--active"));
  e.target.classList.add("panel__tab--active");
  btnUsage.classList.toggle("btn-tool--active", state.panelTab === "usage");
  btnCapabilities.classList.toggle("btn-tool--active", state.panelTab === "capabilities");
  btnFiles.classList.toggle("btn-tool--active", state.panelTab === "files");
  if (state.panelTab === "usage") loadUsageStats();
  else if (state.panelTab === "capabilities") loadCapabilities();
  else if (state.panelTab === "files") loadFiles();
  else renderRepoPanel();
});

/* ═══════════════════════ INIT ═══════════════════════ */

loadUsers()
  .then(() => Promise.all([loadWorkspaces(), loadSessions()]))
  .catch(e => {
    console.error("Failed to initialize users:", e);
    addErrorMessage("Failed to initialize users: " + e.message);
  });
initSidebarResize();
initMobileNav();
initQuickCommands();
initTheme();
</script>
</body>
</html>
