# 团队模块测试数据
# 由 backend-testcase-gen-command 自动生成
# 源文件: sprint8团队管理更新.xmind

api_base: /drama-api
module: team
sprint: sprint8

test_cases:
  # === 团队信息相关 ===
  - id: tc-001
    name: 管理员点击头像区域选择新头像，头像更新成功
    priority: p1
    owner: 魏梦炀
    precondition: 已登录的账号为管理员
    api_path: /teams/{team_id}
    method: PATCH
    request:
      body:
        avatar: "https://example.com/new_avatar.png"
    expected:
      code: 0

  - id: tc-002
    name: 上传的头像非图片格式时系统提示文件格式错误
    priority: p1
    owner: 魏梦炀
    precondition: 已登录的账号为管理员
    api_path: /teams/{team_id}
    method: PATCH
    request:
      body:
        avatar: "https://example.com/avatar.exe"
    expected:
      code: !custom "!=0"
      error_type: format_error

  - id: tc-003
    name: 管理员点击名称区域输入新名称，新名称更新成功
    priority: p1
    owner: 魏梦炀
    precondition: 已登录的账号为管理员
    api_path: /teams/{team_id}
    method: PATCH
    request:
      body:
        name: "新团队名称"
    expected:
      code: 0

  - id: tc-004
    name: 管理员输入新名称超过设定限制时，系统提示名称过长
    priority: p1
    owner: 魏梦炀
    precondition: 已登录的账号为管理员
    api_path: /teams/{team_id}
    method: PATCH
    request:
      body:
        name: "a" * 256
    expected:
      code: !custom "!=0"
      error_type: validation_error

  - id: tc-005
    name: 团队成员和剩余积分展示实时同步
    priority: p1
    owner: 魏梦炀
    precondition: 已登录的账号为管理员
    api_path: /teams/{team_id}
    method: GET
    request:
      params: {}
    expected:
      code: 0
      fields: [members, points, remaining_points]

  # === 角色筛选相关 ===
  - id: tc-006
    name: 新增角色筛选，未筛选时默认为全部
    priority: p1
    owner: 魏梦炀
    precondition: 已登录的账号为管理员
    api_path: /teams/{team_id}/members
    method: GET
    request:
      params: {}
    expected:
      code: 0

  - id: tc-007
    name: 角色筛选下拉时有三个选项：全部、管理员、成员
    priority: p1
    owner: 魏梦炀
    precondition: 已登录的账号为管理员
    api_path: /teams/{team_id}/members
    method: GET
    request:
      params:
        - role: null  # 全部
        - role: admin  # 管理员
        - role: member  # 成员
    expected:
      code: 0

  - id: tc-008
    name: 点击角色筛选下拉框选择管理员，列表仅展示管理员
    priority: p1
    owner: 魏梦炀
    precondition: 已登录的账号为管理员
    api_path: /teams/{team_id}/members
    method: GET
    request:
      params:
        role: admin
    expected:
      code: 0
      members.role: admin

  - id: tc-009
    name: 快速连续切换多个角色筛选条件，最终只展示最后一次结果
    priority: p1
    owner: 魏梦炀
    precondition: 已登录的账号为管理员
    api_path: /teams/{team_id}/members
    method: GET
    request:
      params:
        role: member
    expected:
      code: 0
      members.role: member

  # === 角色切换相关 ===
  - id: tc-010
    name: 管理员切换到成员，角色变更成功，权限同步更新
    priority: p1
    owner: 魏梦炀
    precondition: 已登录的账号为管理员
    api_path: /teams/{team_id}/members
    method: PATCH
    request:
      body:
        member_id: "{member_id}"
        role: member
    expected:
      code: 0

  - id: tc-011
    name: 成员切换到管理员，角色变更成功，权限同步更新
    priority: p1
    owner: 魏梦炀
    precondition: 已登录的账号为管理员
    api_path: /teams/{team_id}/members
    method: PATCH
    request:
      body:
        member_id: "{member_id}"
        role: admin
    expected:
      code: 0

  - id: tc-012
    name: 当团队仅有一位管理员时，切换管理员角色会提示至少保留1位管理员
    priority: p1
    owner: 魏梦炀
    precondition: 已登录的账号为管理员
    api_path: /teams/{team_id}/members
    method: PATCH
    request:
      body:
        member_id: "{last_admin_id}"
        role: member
    expected:
      code: !custom "!=0"
      message: !contains "至少保留1位管理员"
    note: 后端需新增此校验逻辑

  # === 邀请成员相关 ===
  - id: tc-013
    name: 点击邀请成员按钮会弹出邀请成员弹窗
    priority: p1
    owner: 魏梦炀
    precondition: 已登录的账号为管理员
    api_path: /teams/{team_id}/invite
    method: POST
    request:
      body: {}
    expected:
      code: 0
      fields: [invite_code, invite_link]

  - id: tc-014
    name: 点击重置链接，链接会自动更新并重置
    priority: p1
    owner: 魏梦炀
    precondition: 已登录的账号为管理员
    api_path: /teams/{team_id}/invite/reset
    method: POST
    request:
      body: {}
    expected:
      code: 0

  - id: tc-015
    name: 团队信息页面在"我"的后面加【我自己】的标签
    priority: p1
    owner: 魏梦炀
    precondition: 已登录的账号为管理员
    api_path: /teams/{team_id}/members
    method: GET
    request:
      params: {}
    expected:
      code: 0
      current_user_marker: "【我自己】"

